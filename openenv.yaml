spec_version: 1
name: workplace_env
description: >
  Production-grade multi-step customer support triage environment.
  An agent must classify customer intent, generate a professional
  reply, and decide escalation — scored by deterministic graders
  with partial-credit reward shaping across 3 difficulty levels.
type: space
runtime: fastapi
app: server.app:app
port: 8000
tasks:
  - name: easy-triage
    description: Clear single-intent emails (query/refund/complaint)
    difficulty: easy
    max_steps: 3
    reward_range: [0.0, 1.0]
  - name: medium-triage
    description: Mixed-sentiment, ambiguous-intent emails
    difficulty: medium
    max_steps: 3
    reward_range: [0.0, 1.0]
  - name: hard-triage
    description: >
      Adversarial emails with sarcasm, multi-intent, threats,
      and loyalty signals requiring nuanced handling
    difficulty: hard
    max_steps: 3
    reward_range: [0.0, 1.0]
tags:
  - customer-support
  - nlp
  - classification
  - reward-shaping
  - multi-step
