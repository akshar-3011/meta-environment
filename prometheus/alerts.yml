groups:
  - name: meta-environment
    rules:
      # ── Availability ─────────────────────────────────────────────────────
      - alert: HealthcheckFailing
        expr: up{job="meta-environment"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container unhealthy for > 1 minute"
          description: "The meta-environment service is not responding to healthchecks."

      # ── Error Rate ───────────────────────────────────────────────────────
      - alert: HighErrorRate
        expr: rate(env_requests_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 5% for 2 minutes"
          description: "More than 5% of requests are returning 5xx errors."

      - alert: ElevatedErrorRate
        expr: rate(env_requests_total{status=~"5.."}[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Error rate > 1% for 5 minutes"
          description: "Error rate is elevated but below critical threshold."

      # ── Latency ──────────────────────────────────────────────────────────
      - alert: HighLatencyP99
        expr: histogram_quantile(0.99, rate(env_request_duration_seconds_bucket[5m])) > 2.0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency > 2s for 3 minutes"
          description: "99th percentile request latency exceeds 2 seconds."

      - alert: HighLatencyP50
        expr: histogram_quantile(0.50, rate(env_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Median latency > 500ms for 5 minutes"

      # ── Reward Quality ──────────────────────────────────────────────────
      - alert: LowRewardAverage
        expr: histogram_quantile(0.50, rate(env_episode_score_bucket[15m])) < 0.3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Median episode score < 0.3 for 10 minutes"
          description: "Agent performance has degraded significantly — check scenario data or grading logic."

      # ── Rate Limiting ────────────────────────────────────────────────────
      - alert: HighRateLimitRejections
        expr: rate(env_requests_total{status="429"}[5m]) > 0.1
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Sustained rate limit rejections"
          description: "More than 10% of requests are being rate-limited — consider adjusting limits."

      # ── Episode Throughput ───────────────────────────────────────────────
      - alert: NoEpisodesCompleted
        expr: increase(env_episodes_total[30m]) == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "No episodes completed in 30 minutes"
          description: "The environment has not completed any episodes — possible deadlock or no incoming requests."
