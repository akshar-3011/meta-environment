name: CI

on: [push, pull_request]

env:
  IMAGE_NAME: meta-environment

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check . --select E,W,F --ignore E501
        continue-on-error: true

      - name: Type check with mypy
        run: uv run mypy . --ignore-missing-imports --no-strict-optional
        continue-on-error: true

      - name: Run tests with coverage
        run: uv run pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-fail-under=80

      - name: Validate OpenEnv
        run: uv run openenv validate

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "sha_tag=${{ env.IMAGE_NAME }}:sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker image (SHA-tagged)
        run: docker build --no-cache -t ${{ steps.tag.outputs.sha_tag }} -t ${{ env.IMAGE_NAME }}:latest .

      - name: Verify import
        run: docker run --rm ${{ steps.tag.outputs.sha_tag }} python -c "import server.app; print('Import OK')"

      - name: Verify healthcheck
        run: |
          docker run -d --name hc_test -p 7860:7860 ${{ steps.tag.outputs.sha_tag }}
          sleep 5
          curl -f http://localhost:7860/health || exit 1
          docker stop hc_test && docker rm hc_test
