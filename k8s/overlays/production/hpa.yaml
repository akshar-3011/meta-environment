apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: meta-env
  namespace: meta-environment
  labels:
    app.kubernetes.io/name: meta-environment
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: meta-env
  minReplicas: 10
  maxReplicas: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 5
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
