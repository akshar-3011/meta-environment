apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: meta-environment

resources:
  - ../../base
  - hpa.yaml
  - pdb.yaml
  - networkpolicy.yaml

patches:
  # Scale to 10 replicas for production
  - target:
      kind: Deployment
      name: meta-env
    patch: |
      - op: replace
        path: /spec/replicas
        value: 10
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 1Gi

  # Production ConfigMap overrides
  - target:
      kind: ConfigMap
      name: meta-env-config
    patch: |
      - op: replace
        path: /data/APP_LOG_LEVEL
        value: "WARNING"
      - op: replace
        path: /data/API_MAX_CONCURRENT_ENVS
        value: "50"

commonLabels:
  environment: production

commonAnnotations:
  meta-environment/tier: "production"
