# This file should be encrypted with SOPS before committing.
# To encrypt:  sops --encrypt --in-place k8s/base/secret.yaml
# To decrypt:  sops --decrypt k8s/base/secret.yaml
#
# For CI/CD, use External Secrets Operator or sealed-secrets instead.
apiVersion: v1
kind: Secret
metadata:
  name: meta-env-secrets
  namespace: meta-environment
  labels:
    app.kubernetes.io/name: meta-environment
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  API_KEY: "CHANGE_ME_use_sops_to_encrypt"
  OPENAI_API_KEY: "CHANGE_ME_use_sops_to_encrypt"
  DATABASE_URL: "sqlite:///data/experiments.db"
