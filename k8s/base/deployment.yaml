apiVersion: apps/v1
kind: Deployment
metadata:
  name: meta-env
  namespace: meta-environment
  labels:
    app.kubernetes.io/name: meta-environment
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: meta-environment
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: meta-environment
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7860"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: meta-env
      terminationGracePeriodSeconds: 30

      # ── Security Context (pod-level) ──────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # ── Anti-affinity: spread across nodes ────────────────────────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: meta-environment
                topologyKey: kubernetes.io/hostname

      containers:
        - name: meta-env
          image: ghcr.io/akshar-3011/meta-environment:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 7860
              protocol: TCP

          # ── Resource Management ─────────────────────────────────
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi

          # ── Environment: ConfigMap + Secrets ────────────────────
          envFrom:
            - configMapRef:
                name: meta-env-config
            - secretRef:
                name: meta-env-secrets

          # ── Probes ──────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
            successThreshold: 1

          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 10

          # ── Container Security ──────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # ── Volume Mounts ───────────────────────────────────────
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /data

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        - name: data
          emptyDir:
            sizeLimit: 500Mi
